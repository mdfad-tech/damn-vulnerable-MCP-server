name: AI Surface Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-surface:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Surface Check
        uses: apisec-inc/AI-Surface@v1.0.2
        with:
          path: "."
          comment-on-pr: "true"
          fail-on: "high"
